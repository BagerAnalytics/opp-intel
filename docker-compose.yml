version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: oppintel-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: oppintel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  neo4j:
    image: neo4j:5.9.0
    container_name: oppintel-neo4j
    environment:
      NEO4J_AUTH: neo4j/adminpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: always

volumes:
  postgres_data:
  neo4j_data:
